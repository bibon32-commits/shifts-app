<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0c10">

<link rel="manifest" href="manifest.json">

<title>Смены</title>

<style>
*{box-sizing:border-box;}

html,body{
width:100%;
margin:0;
overflow-x:hidden;
font-family:-apple-system,BlinkMacSystemFont;
background:#0b0c10;
color:white;
}

body{
text-align:center;
padding-bottom:env(safe-area-inset-bottom);
}

h2{margin:12px 0;}

.topBlock{
background:rgba(28,31,42,0.6);
backdrop-filter: blur(14px);
border-radius:18px;
padding:12px;
margin:12px;
}

input,select{
background:#1c1f2a;
color:white;
border:none;
padding:10px;
margin:4px;
border-radius:10px;
font-size:13px;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:14px;
margin:8px;
}

button{
padding:8px 14px;
font-size:18px;
border:none;
border-radius:12px;
background:#1c1f2a;
color:white;
}

button:active{transform:scale(0.9);}

#wrap{
position:relative;
height:calc(100dvh - 240px - env(safe-area-inset-bottom));
overflow:hidden;
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
padding:10px;
width:100%;
position:absolute;
transition:transform .35s ease, opacity .25s ease;
}

.dayBox{
background:#1c1f2a;
border-radius:16px;
padding:8px;
font-size:11px;
min-height:64px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.work,.night{background:#2d303d;}
.sleep,.off{background:#5c5c5c;}
.today{outline:2px solid #4da3ff;}
.small{font-size:9px;opacity:0.6;}

#counter{margin:6px;font-size:13px;opacity:0.8;}
</style>
</head>

<body>

<h2>Смены</h2>

<div class="topBlock">
<input id="n0"><input id="d0" type="date"><br>
<input id="n1"><input id="d1" type="date"><br>
<input id="n2"><input id="d2" type="date"><br>
<input id="n3"><input id="d3" type="date"><br>
<select id="worker"></select>
</div>

<div class="controls">
<button onclick="animateMonth(-1)">‹</button>
<div id="monthLabel"></div>
<button onclick="animateMonth(1)">›</button>
</div>

<div id="counter"></div>

<div id="wrap">
<div id="calendar" class="grid"></div>
</div>

<script>

const c=document.getElementById("calendar");
const w=document.getElementById("worker");
const mLabel=document.getElementById("monthLabel");
const counter=document.getElementById("counter");

const n0=n1=n2=n3=null;
const d0=d1=d2=d3=null;

let names=JSON.parse(localStorage.getItem("names"))||["Давид","Женя","Рома","Я"];
let dates=JSON.parse(localStorage.getItem("dates"))||["","","",""];
let selected=localStorage.getItem("worker")||names[0];
let manual=JSON.parse(localStorage.getItem("manual"))||{};

let current=new Date();

/* DOM refs */
const nn=[n0,n1,n2,n3].map((_,i)=>document.getElementById("n"+i));
const dd=[d0,d1,d2,d3].map((_,i)=>document.getElementById("d"+i));

/* vibro */
function vibro(t="light"){
if(!navigator.vibrate) return;
if(t=="light")navigator.vibrate(10);
if(t=="medium")navigator.vibrate(20);
}

/* cycle */
function cycle(d){
return ["День","Ночь","Отсыпной","Выходной"][((d%4)+4)%4];
}
function color(s){
return {День:"work",Ночь:"night",Отсыпной:"sleep",Выходной:"off"}[s];
}
function next(s){
let a=["День","Ночь","Отсыпной","Выходной"];
return a[(a.indexOf(s)+1)%4];
}

/* SWIPE */
let sx=0;
document.addEventListener("touchstart",e=>sx=e.touches[0].clientX);
document.addEventListener("touchend",e=>{
let ex=e.changedTouches[0].clientX;
if(sx-ex>50){vibro();animateMonth(1);}
if(ex-sx>50){vibro();animateMonth(-1);}
});

/* ANIMATION */
function animateMonth(dir){

c.style.opacity="0";
c.style.transform=`translateX(${dir*100}%)`;

setTimeout(()=>{
current.setMonth(current.getMonth()+dir);
render();

c.style.transform=`translateX(${-dir*100}%)`;

requestAnimationFrame(()=>{
c.style.opacity="1";
c.style.transform="translateX(0)";
});

},200);
}

/* TOGGLE */
function toggle(k,b){
manual[k]=next(manual[k]||b);
vibro("medium");
saveM();
render();
}

/* SAVE */
function save(){
names=nn.map(i=>i.value);
dates=dd.map(i=>i.value);
localStorage.setItem("names",JSON.stringify(names));
localStorage.setItem("dates",JSON.stringify(dates));
localStorage.setItem("worker",selected);
}
function saveM(){
localStorage.setItem("manual",JSON.stringify(manual));
}

/* RENDER */
function render(){

save();
c.innerHTML="";

let y=current.getFullYear();
let m=current.getMonth();

mLabel.textContent=current.toLocaleDateString("ru-RU",{month:"long",year:"numeric"});

let first=new Date(y,m,1).getDay();
if(first==0)first=7;

let days=new Date(y,m+1,0).getDate();

let i=names.indexOf(w.value);
let start=new Date(dates[i]||0);

let today=new Date();
let work=0;

for(let i=1;i<first;i++)c.innerHTML+="<div></div>";

for(let d=1;d<=days;d++){

let dt=new Date(y,m,d);
let diff=Math.floor((dt-start)/86400000);
let base=cycle(diff);

let k=`${y}-${m}-${d}`;
let s=manual[k]||base;

if(s!="Отсыпной"&&s!="Выходной")work++;

c.innerHTML+=`
<div class="dayBox ${color(s)} ${dt.toDateString()==today.toDateString()?"today":""}"
onclick="toggle('${k}','${base}')">
<div>${d}</div>
<div class="small">${dt.toLocaleDateString("ru-RU",{weekday:"short"})}</div>
<div><b>${s}</b></div>
</div>`;
}

counter.textContent="Рабочих смен: "+work;
}

/* INIT */
w.onchange=()=>{selected=w.value;save();render();};

function init(){
names.forEach((n,i)=>{
if(nn[i])nn[i].value=n;
if(dd[i])dd[i].value=dates[i];
});

w.innerHTML="";
names.forEach(n=>{
let o=document.createElement("option");
o.text=n;
w.add(o);
});

w.value=selected;
render();
}

init();

/* PWA */
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
