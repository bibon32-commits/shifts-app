<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0c10">
<title>Смены</title>
<style>
*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

:root{
    --bg:#0b0c10;
    --panel:rgba(28,31,42,0.82);
    --card:#171a22;
    --text:#ffffff;
    --accent:#4da3ff;
    --dark:#2d303d;
    --gray:#5c5c5c;
    --muted:rgba(255,255,255,0.72);
}

html,body{
    margin:0;
    padding:0;
    width:100%;
    max-width:100%;
    overflow-x:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--bg);
    color:var(--text);
}

body{
    text-align:center;
    padding:max(8px, env(safe-area-inset-top)) 8px env(safe-area-inset-bottom);
}

h2{
    margin:8px 0 10px;
    font-size:22px;
    font-weight:700;
}

.topBlock{
    background:var(--panel);
    border-radius:18px;
    padding:10px;
    margin:0 0 10px;
    backdrop-filter:blur(10px);
}

.workerRow{
    margin:6px 0;
}

input,select{
    width:100%;
    background:var(--card);
    color:var(--text);
    border:none;
    padding:11px 12px;
    margin:0;
    border-radius:12px;
    font-size:16px;
    line-height:1.2;
    max-width:100%;
    -webkit-appearance:none;
    appearance:none;
}

.controls{
    display:grid;
    grid-template-columns:46px 1fr 46px;
    align-items:center;
    gap:8px;
    margin:0 0 8px;
}

button{
    padding:8px 0;
    font-size:20px;
    border:none;
    border-radius:12px;
    background:var(--card);
    color:var(--text);
}

button:active{
    transform:scale(0.96);
}

#monthLabel{
    font-size:16px;
    font-weight:600;
    text-transform:capitalize;
}

#counter{
    margin:0 0 8px;
    font-size:12px;
    color:var(--muted);
}

#wrap{
    height:calc(100vh - 255px - env(safe-area-inset-bottom) - env(safe-area-inset-top));
    height:calc(100dvh - 255px - env(safe-area-inset-bottom) - env(safe-area-inset-top));
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    width:100%;
}

.grid{
    display:grid;
    grid-template-columns:repeat(7, minmax(0, 1fr));
    gap:3px;
    width:100%;
}

.dayBox{
    min-width:0;
    background:var(--card);
    border-radius:12px;
    padding:6px 3px;
    min-height:60px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
    overflow:hidden;
    word-break:break-word;
    overflow-wrap:anywhere;
    font-size:9px;
    line-height:1.15;
}

.dayNum{
    font-size:13px;
    font-weight:700;
}

.dayName{
    font-size:7px;
    opacity:0.65;
    text-transform:lowercase;
}

.dayShift{
    font-size:9px;
}

.work.night{
    background:var(--dark);
}

.sleep.off{
    background:var(--gray);
}

.today{
    outline:2px solid var(--accent);
    outline-offset:-2px;
}

@media (max-width:390px){
    #wrap{
        height:calc(100vh - 247px - env(safe-area-inset-bottom) - env(safe-area-inset-top));
        height:calc(100dvh - 247px - env(safe-area-inset-bottom) - env(safe-area-inset-top));
    }

    .dayBox{
        min-height:56px;
        padding:5px 2px;
        font-size:8px;
    }

    .dayNum{
        font-size:12px;
    }

    .dayName{
        font-size:6px;
    }

    .dayShift{
        font-size:8px;
    }
}
</style>
</head>
<body>

<h2>Смены</h2>

<div class="topBlock">
  <div class="workerRow"><input id="n0" placeholder="Имя 1"></div>
  <div class="workerRow"><input id="n1" placeholder="Имя 2"></div>
  <div class="workerRow"><input id="n2" placeholder="Имя 3"></div>
  <div class="workerRow"><input id="n3" placeholder="Имя 4"></div>
  <div class="workerRow"><select id="worker"></select></div>
</div>

<div class="controls">
  <button type="button" onclick="animateMonth(-1)">‹</button>
  <div id="monthLabel"></div>
  <button type="button" onclick="animateMonth(1)">›</button>
</div>

<div id="counter"></div>

<div id="wrap">
  <div id="calendar" class="grid"></div>
</div>

<script>
const c = document.getElementById("calendar");
const wrap = document.getElementById("wrap");
const w = document.getElementById("worker");
const mLabel = document.getElementById("monthLabel");
const counter = document.getElementById("counter");
const nInputs = ["n0", "n1", "n2", "n3"].map(id => document.getElementById(id));

const defaultNames = ["Давид", "Женька", "Рома", "Я"];
const defaultDates = ["2026-04-22", "2026-04-20", "2026-04-19", "2026-04-21"];

let names = JSON.parse(localStorage.getItem("names")) || defaultNames.slice();
let selected = localStorage.getItem("worker") || names[0];
let manual = JSON.parse(localStorage.getItem("manual")) || {};
let current = new Date();
let startX = 0;
let startY = 0;

function vibro(type = "light") {
  if (!navigator.vibrate) return;
  navigator.vibrate(type === "light" ? 10 : 20);
}

function cycle(diff) {
  return ["День","Ночь","Отсыпной","Выходной"][((diff % 4) + 4) % 4];
}

function color(status) {
  return {
    "День": "sleep off",
    "Ночь": "sleep off",
    "Отсыпной": "work night",
    "Выходной": "work night"
  }[status];
}

function next(status) {
  const states = ["День","Ночь","Отсыпной","Выходной"];
  return states[(states.indexOf(status) + 1) % 4];
}

function parseWorkerStartDate(value) {
  const parsed = new Date(value + "T00:00:00");
  return Number.isNaN(parsed.getTime()) ? null : parsed;
}

function save() {
  names = nInputs.map((input, index) => input.value.trim() || defaultNames[index]);
  selected = w.value || names[0];
  localStorage.setItem("names", JSON.stringify(names));
  localStorage.setItem("worker", selected);
}

function saveManual() {
  localStorage.setItem("manual", JSON.stringify(manual));
}

function animateMonth(dir) {
  c.style.opacity = "0";
  c.style.transform = "translateX(" + (dir * 40) + "px)";
  setTimeout(() => {
    current.setMonth(current.getMonth() + dir);
    render();
    c.style.transform = "translateX(" + (-dir * 40) + "px)";
    requestAnimationFrame(() => {
      c.style.opacity = "1";
      c.style.transform = "translateX(0)";
      wrap.scrollTop = 0;
    });
  }, 160);
}

function toggle(key, fallbackStatus) {
  manual[key] = next(manual[key] || fallbackStatus);
  vibro("medium");
  saveManual();
  render();
}

function fillWorkerSelect() {
  const prev = w.value || selected;
  w.innerHTML = "";
  names.forEach(name => {
    const option = document.createElement("option");
    option.value = name;
    option.textContent = name;
    w.appendChild(option);
  });
  w.value = names.includes(prev) ? prev : names[0];
}

function render() {
  save();
  fillWorkerSelect();
  c.innerHTML = "";

  const year = current.getFullYear();
  const month = current.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDayRaw = new Date(year, month, 1).getDay();
  const firstDay = firstDayRaw === 0 ? 6 : firstDayRaw - 1;
  const today = new Date();
  let totalWorkDays = 0;

  mLabel.textContent = current.toLocaleDateString("ru-RU", {
    month: "long",
    year: "numeric"
  });

  for (let i = 0; i < firstDay; i++) {
    c.innerHTML += "<div></div>";
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const dt = new Date(year, month, day);
    const isToday = dt.toDateString() === today.toDateString();
    let boxClass = "dayBox" + (isToday ? " today" : "");
    let dayStatus = "";

    names.forEach((name, idx) => {
      if (w.value !== name) return;

      const startDate = parseWorkerStartDate(defaultDates[idx]);
      const baseShift = cycle(Math.floor((dt - startDate) / 864e5));
      const key = year + "-" + (month + 1) + "-" + day + "-" + name;
      const status = manual[key] || baseShift;

      if (status === "День" || status === "Ночь") {
        totalWorkDays++;
      }

      boxClass += " " + color(status);
      dayStatus = status;
    });

    c.innerHTML += '<div class="' + boxClass + '" onclick="toggle(\'' + year + "-" + (month + 1) + "-" + day + "-" + w.value + '\', \'День\')">' +
      '<div class="dayNum">' + day + "</div>" +
      '<div class="dayName">' + dt.toLocaleDateString("ru-RU", { weekday: "short" }) + "</div>" +
      '<div class="dayShift">' + dayStatus + "</div>" +
      "</div>";
  }

  counter.textContent = "Рабочих смен (" + w.value + "): " + totalWorkDays;
}

c.addEventListener("touchstart", event => {
  startX = event.touches[0].clientX;
  startY = event.touches[0].clientY;
}, { passive: true });

c.addEventListener("touchend", event => {
  const endX = event.changedTouches[0].clientX;
  const endY = event.changedTouches[0].clientY;
  const diffX = startX - endX;
  const diffY = startY - endY;

  if (Math.abs(diffY) > 50 || Math.abs(diffX) < 50) return;

  vibro();
  animateMonth(diffX > 0 ? 1 : -1);
}, { passive: true });

w.onchange = () => {
  save();
  render();
};

nInputs.forEach(input => {
  input.oninput = () => {
    save();
    render();
  };
});

function init() {
  nInputs.forEach((input, index) => {
    input.value = names[index] || defaultNames[index];
  });

  fillWorkerSelect();
  if (names.includes(selected)) {
    w.value = selected;
  }

  render();
}

init();
</script>
</body>
</html>
