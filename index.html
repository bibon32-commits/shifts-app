<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0c10">

<title>Смены</title>

<style>
*{
    box-sizing:border-box;
}

html,body{
    margin:0;
    padding:0;
    width:100%;
    max-width:100%;
    overflow-x:hidden;
    font-family:-apple-system, BlinkMacSystemFont;
    background:#0b0c10;
    color:white;
}

body{
    text-align:center;
    padding-bottom:env(safe-area-inset-bottom);
}

h2{margin:12px 0;}

.topBlock{
    background:rgba(28,31,42,0.6);
    border-radius:18px;
    padding:10px;
    margin:10px;
}

input, select{
    background:#1c1f2a;
    color:white;
    border:none;
    padding:8px;
    margin:3px;
    border-radius:10px;
    font-size:13px;
    max-width:100%;
}

.controls{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin:8px;
}

button{
    padding:8px 14px;
    font-size:18px;
    border:none;
    border-radius:12px;
    background:#1c1f2a;
    color:white;
}
button:active{transform:scale(0.9);}

#wrap{
    position:relative;
    height:calc(100vh - 220px - env(safe-area-inset-bottom));
    overflow-y: auto; /* Включаем вертикальный скролл */
    -webkit-overflow-scrolling: touch; /* Плавный скролл на iOS */
    width:100%;
}

.grid{
    display:grid;
    grid-template-columns:repeat(7, minmax(0, 1fr));
    gap:2px;
    padding:6px;
    width:100%;
    max-width:100%;
    position:absolute; /* Важно для анимации */
    transition:transform .3s ease, opacity .25s ease;
}

.dayBox{
    background:#1c1f2a;
    border-radius:12px;
    padding:6px;
    font-size:10px;
    min-height:52px;

    display:flex;
    flex-direction:column;
    justify-content:space-between;
    overflow:hidden;
}

.work,.night{background:#2d303d;}
.sleep,.off{background:#5c5c5c;}
.today{outline:2px solid #4da3ff;}

.small{font-size:8px;opacity:0.6;}

#counter{
    margin:6px;
    font-size:12px;
    opacity:0.8;
}
</style>
</head>
<body>

<h2>Смены</h2>

<div class="topBlock">
<input id="n0"><input id="d0" type="date"><br>
<input id="n1"><input id="d1" type="date"><br>
<input id="n2"><input id="d2" type="date"><br>
<input id="n3"><input id="d3" type="date"><br>

<select id="worker"></select>
</div>

<div class="controls">
<button onclick="animateMonth(-1)">‹</button>
<div id="monthLabel"></div>
<button onclick="animateMonth(1)">›</button>
</div>

<div id="counter"></div>

<div id="wrap">
<div id="calendar" class="grid"></div>
</div>

<script>
const c = document.getElementById("calendar");
const w = document.getElementById("worker");
const mLabel = document.getElementById("monthLabel");
const counter = document.getElementById("counter");

const nInputs = [document.getElementById("n0"), document.getElementById("n1"), document.getElementById("n2"), document.getElementById("n3")];
const dInputs = [document.getElementById("d0"), document.getElementById("d1"), document.getElementById("d2"), document.getElementById("d3")];

let names = JSON.parse(localStorage.getItem("names")) || ["Давид", "Женя", "Рома", "Я"];
let dates = JSON.parse(localStorage.getItem("dates")) || ["", "", "", ""];
let selected = localStorage.getItem("worker") || names[0];
let manual = JSON.parse(localStorage.getItem("manual")) || {};

let current = new Date();
let startX = 0; // Для отслеживания свайпа

/* ===== VIBRO ===== */
function vibro(t = "light") {
  if (!navigator.vibrate) return;
  if (t === "light") navigator.vibrate(10);
  if (t === "medium") navigator.vibrate(20);
}

/* ===== CYCLE ===== */
function cycle(d) {
  return ["День", "Ночь", "Отсыпной", "Выходной"][((d % 4) + 4) % 4];
}
function color(s) {
  return { День:"work", Ночь:"night", Отсыпной:"sleep", Выходной:"off" }[s];
}
function next(s) {
  let a = ["День", "Ночь", "Отсыпной", "Выходной"];
  return a[(a.indexOf(s) + 1) % 4];
}

/* ===== SWIPE (Адаптировано для iOS) ===== */
c.addEventListener('touchstart', e => {
  startX = e.touches[0].clientX;
});
c.addEventListener('touchend', e => {
  if (Math.abs(e.changedTouches[0].clientY - startX) > 50) return; // Вертикальный скролл

  const endX = e.changedTouches[0].clientX;
  const diff = startX - endX; // Свайп вправо -> +

  if (diff > 50) {
      vibro();
      animateMonth(1);
  } else if (diff < -50) {
      vibro();
      animateMonth(-1);
  }
});

/* ===== ANIMATION ===== */
function animateMonth(dir) {
  c.style.opacity = "0";
  c.style.transform = `translateX(${dir * 100}%)`;

  setTimeout(() => {
      current.setMonth(current.getMonth() + dir);
      render();
      c.style.transform = `translateX(${-dir * 100}%)`;
      requestAnimationFrame(() => {
          c.style.opacity = "1";
          c.style.transform = "translateX(0)";
          document.getElementById('wrap').scrollTop = 0; 
      });
  }, 180);
}

/* ===== TOGGLE ===== */
function toggle(k,b){
  manual[k] = next(manual[k] || b);
  vibro("medium");
  saveM();
  render();
}

/* ===== SAVE ===== */
function save() {
  names = nInputs.map(i => i.value);
  dates = dInputs.map(i => i.value);
  localStorage.setItem("names", JSON.stringify(names));
  localStorage.setItem("dates", JSON.stringify(dates));
}
function saveM() {
  localStorage.setItem("manual", JSON.stringify(manual));
}

/* ===== RENDER (ГЛАВНОЕ ИСПРАВЛЕНИЕ) ===== */
function render() {

   save(); // Сохраняем данные перед рендером

   c.innerHTML = "";
   let y = current.getFullYear();
   let m = current.getMonth(); // Месяцы с 0 (Янв) по 11 (Дек)
   let daysInMonth = new Date(y, m + 1, 0).getDate();
   let firstDayOfMonth = new Date(y, m, 1).getDay(); // getDay(): вс=0 ... сб=6

   mLabel.textContent = current.toLocaleDateString("ru-RU", { month:"long", year:"numeric" });

   // Отрисовка пустых ячеек перед первым днем месяца
   for(let i=firstDayOfMonth; i>0; i--) {
       c.innerHTML += "<div></div>";
   }
   
   let totalWorkDaysForSelectedWorker = 0; // Счетчик для выбранного работника

   // Основной цикл отрисовки дней месяца
   for(let d=1; d<=daysInMonth; d++){
       let dt = new Date(y, m, d);
       
       // --- НАЧАЛО БЛОКА РАСЧЕТА ДЛЯ КАЖДОГО ДНЯ ---
       let dayStatusHTML = "";
       let isTodayClass = dt.toDateString() === new Date().toDateString() ? "today" : "";
       
       // Перебираем всех работников для этого дня
       names.forEach((name, idx) => {
           let workerStartDateStr = dates[idx] || '2024-01-01';
           let workerStartDate = new Date(workerStartDateStr);
           
           // Проверяем, выбран ли этот работник сейчас в селекте
           let isSelectedWorker = (w.value === name);
           
           // Рассчитываем базовую смену исходя из даты начала этого работника
           let diffDays = Math.floor((dt - workerStartDate) / (1000 * 60 *60 *24));
           let baseShiftForWorker = cycle(diffDays);
           
           // Уникальный ключ для хранения ручных правок (год-месяц-день-имя)
           let k = `${y}-${m+1}-${d}-${name}`; 
           let statusForWorker = manual[k] || baseShiftForWorker;
           
           // Если это текущий выбранный работник и сегодня его рабочая смена - красим ячейку и считаем ее
           if(isSelectedWorker && statusForWorker !== "Отсыпной" && statusForWorker !== "Выходной"){
               dayStatusHTML += `<b>${statusForWorker}</b><br>`; // Показываем статус выбранного работника жирным
               totalWorkDaysForSelectedWorker++;
               isTodayClass += ` ${color(statusForWorker)}`; // Добавляем класс цвета к .today если нужно
           } else if(isSelectedWorker){
               dayStatusHTML += `${statusForWorker}<br>`; // Показываем статус нерабочего дня обычного шрифтом
           }
       });
       // --- КОНЕЦ БЛОКА РАСЧЕТА ---
       
       c.innerHTML += `
         <div class="dayBox ${isTodayClass}"
             onclick="toggle('${y}-${m+1}-${d}-${w.value}','День')"> <!-- Ключ теперь содержит имя -->
             <div>${d}</div>
             <div class="small">${dt.toLocaleDateString("ru-RU", {weekday:"short"})}</div>
             <div>${dayStatusHTML}</div> <!-- Вставляем собранный HTML статусов -->
         </div>`;
   }
   
   // Обновляем счетчик внизу для выбранного работника
   counter.textContent = `Рабочих смен (${w.value}): ${totalWorkDaysForSelectedWorker}`;
}


/* ===== INIT & EVENTS (Адаптировано) ===== */
// Перерисовка при изменении данных в инпутах или селекте
w.onchange = () => { selected = w.value; save(); render(); };
nInputs.forEach(inp => inp.oninput = render);
dInputs.forEach(inp => inp.onchange = render); 

function init() {
   nInputs.forEach((nInput, i) => { nInput.value = names[i]; });
   dInputs.forEach((dInput, i) => { dInput.value = dates[i]; });
   
   w.innerHTML = "";
   names.forEach(n => {
       let o = document.createElement("option");
       o.textContent = n; 
       w.appendChild(o);
   });
   
   w.value = selected;
   render();
}
init();
</script>
</body>
</html>
