<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0c10">
<title>Смены</title>
<style>
*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

:root{
    --bg:#0b0c10;
    --panel:rgba(28,31,42,0.82);
    --card:#171a22;
    --text:#ffffff;
    --accent:#4da3ff;
    --dark:#2d303d;
    --gray:#5c5c5c;
    --muted:rgba(255,255,255,0.72);
    --week:#11141b;
}

html,body{
    margin:0;
    padding:0;
    width:100%;
    max-width:100%;
    overflow-x:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--bg);
    color:var(--text);
}

body{
    text-align:center;
    padding:max(8px, env(safe-area-inset-top)) 8px env(safe-area-inset-bottom);
}

h2{
    margin:8px 0 10px;
    font-size:22px;
    font-weight:700;
}

.topBlock{
    background:var(--panel);
    border-radius:18px;
    padding:10px;
    margin:0 0 10px;
    backdrop-filter:blur(10px);
}

.workerSwitch{
    display:grid;
    grid-template-columns:52px 1fr 52px;
    align-items:center;
    gap:8px;
}

.switchBtn{
    border:none;
    border-radius:14px;
    background:linear-gradient(180deg, #1c2029 0%, #151821 100%);
    color:var(--text);
    min-height:52px;
    font-size:22px;
    font-weight:700;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.03);
}

.switchBtn:active,
button:active{
    transform:scale(0.96);
}

.workerName{
    min-height:52px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0 12px;
    border-radius:14px;
    background:linear-gradient(180deg, #1c2029 0%, #151821 100%);
    border:1px solid rgba(255,255,255,0.06);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.03);
    font-size:18px;
    font-weight:600;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    user-select:none;
}

.controls{
    display:grid;
    grid-template-columns:46px 1fr 46px;
    align-items:center;
    gap:8px;
    margin:0 0 8px;
}

button{
    padding:8px 0;
    font-size:20px;
    border:none;
    border-radius:12px;
    background:var(--card);
    color:var(--text);
}

#monthLabel{
    font-size:16px;
    font-weight:600;
    text-transform:capitalize;
}

#counter{
    margin:0 0 8px;
    font-size:12px;
    color:var(--muted);
}

#wrap{
    height:calc(100vh - 220px - env(safe-area-inset-bottom) - env(safe-area-inset-top));
    height:calc(100dvh - 220px - env(safe-area-inset-bottom) - env(safe-area-inset-top));
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    width:100%;
}

.weekHeader{
    display:grid;
    grid-template-columns:repeat(7, minmax(0, 1fr));
    gap:3px;
    margin:0 0 4px;
}

.weekDay{
    background:var(--week);
    border-radius:10px;
    padding:6px 0;
    font-size:10px;
    font-weight:600;
    color:var(--muted);
    text-transform:lowercase;
}

.grid{
    display:grid;
    grid-template-columns:repeat(7, minmax(0, 1fr));
    gap:3px;
    width:100%;
}

.emptyCell{
    min-height:60px;
}

.dayBox{
    min-width:0;
    background:var(--card);
    border-radius:12px;
    padding:6px 3px;
    min-height:60px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
    overflow:hidden;
    word-break:break-word;
    overflow-wrap:anywhere;
    font-size:9px;
    line-height:1.15;
    user-select:none;
}

.dayNum{
    font-size:13px;
    font-weight:700;
}

.dayName{
    font-size:7px;
    opacity:0.65;
    text-transform:lowercase;
}

.dayShift{
    font-size:9px;
}

.work.night{
    background:var(--dark);
}

.sleep.off{
    background:var(--gray);
}

.today{
    outline:2px solid var(--accent);
    outline-offset:-2px;
}

@media (max-width:390px){
    #wrap{
        height:calc(100vh - 210px - env(safe-area-inset-bottom) - env(safe-area-inset-top));
        height:calc(100dvh - 210px - env(safe-area-inset-bottom) - env(safe-area-inset-top));
    }

    .workerSwitch{
        grid-template-columns:48px 1fr 48px;
    }

    .switchBtn,
    .workerName{
        min-height:50px;
    }

    .workerName{
        font-size:17px;
    }

    .weekDay{
        font-size:9px;
        padding:5px 0;
    }

    .dayBox{
        min-height:56px;
        padding:5px 2px;
        font-size:8px;
    }

    .dayNum{
        font-size:12px;
    }

    .dayName{
        font-size:6px;
    }

    .dayShift{
        font-size:8px;
    }

    .emptyCell{
        min-height:56px;
    }
}
</style>
</head>
<body>

<h2>Смены</h2>

<div class="topBlock">
  <div class="workerSwitch" id="workerSwitch">
    <button type="button" class="switchBtn" id="workerPrev">‹</button>
    <div class="workerName" id="workerName">Я</div>
    <button type="button" class="switchBtn" id="workerNext">›</button>
  </div>
</div>

<div class="controls">
  <button type="button" id="prevBtn">‹</button>
  <div id="monthLabel"></div>
  <button type="button" id="nextBtn">›</button>
</div>

<div id="counter"></div>

<div id="wrap">
  <div class="weekHeader" id="weekHeader"></div>
  <div id="calendar" class="grid"></div>
</div>

<script>
const c = document.getElementById("calendar");
const wrap = document.getElementById("wrap");
const mLabel = document.getElementById("monthLabel");
const counter = document.getElementById("counter");
const weekHeader = document.getElementById("weekHeader");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const workerPrev = document.getElementById("workerPrev");
const workerNext = document.getElementById("workerNext");
const workerName = document.getElementById("workerName");
const workerSwitch = document.getElementById("workerSwitch");

const names = ["Давид", "Женька", "Рома", "Я"];
const defaultDates = ["2026-04-22", "2026-04-20", "2026-04-19", "2026-04-21"];
const weekDays = ["пн","вт","ср","чт","пт","сб","вс"];

let selected = localStorage.getItem("worker");
if (!names.includes(selected)) selected = "Я";

let manual = JSON.parse(localStorage.getItem("manual")) || {};
let current = new Date();

let calendarStartX = 0;
let calendarStartY = 0;
let workerStartX = 0;
let workerStartY = 0;

function vibro(type = "light") {
  if (!navigator.vibrate) return;
  const pattern = {
    light: 10,
    medium: 18,
    strong: [12, 20, 12]
  };
  navigator.vibrate(pattern[type] || 10);
}

function cycle(diff) {
  return ["День","Ночь","Отсыпной","Выходной"][((diff % 4) + 4) % 4];
}

function color(status) {
  return {
    "День": "sleep off",
    "Ночь": "sleep off",
    "Отсыпной": "work night",
    "Выходной": "work night"
  }[status];
}

function next(status) {
  const states = ["День","Ночь","Отсыпной","Выходной"];
  return states[(states.indexOf(status) + 1) % 4];
}

function parseWorkerStartDate(value) {
  const parsed = new Date(value + "T00:00:00");
  return Number.isNaN(parsed.getTime()) ? null : parsed;
}

function save() {
  localStorage.setItem("worker", selected);
}

function saveManual() {
  localStorage.setItem("manual", JSON.stringify(manual));
}

function setWorker(step) {
  const currentIndex = names.indexOf(selected);
  const nextIndex = (currentIndex + step + names.length) % names.length;
  selected = names[nextIndex];
  workerName.textContent = selected;
  save();
  vibro("light");
  render();
}

function animateMonth(dir) {
  c.style.opacity = "0";
  c.style.transform = "translateX(" + (dir * 38) + "px)";
  vibro("light");

  setTimeout(() => {
    current.setMonth(current.getMonth() + dir);
    render();
    c.style.transform = "translateX(" + (-dir * 38) + "px)";
    requestAnimationFrame(() => {
      c.style.opacity = "1";
      c.style.transform = "translateX(0)";
      wrap.scrollTop = 0;
    });
  }, 150);
}

function toggle(key, fallbackStatus) {
  manual[key] = next(manual[key] || fallbackStatus);
  vibro("medium");
  saveManual();
  render();
}

function renderWeekHeader() {
  weekHeader.innerHTML = weekDays
    .map(day => '<div class="weekDay">' + day + "</div>")
    .join("");
}

function render() {
  save();
  workerName.textContent = selected;
  c.innerHTML = "";

  const year = current.getFullYear();
  const month = current.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDayRaw = new Date(year, month, 1).getDay();
  const firstDay = firstDayRaw === 0 ? 6 : firstDayRaw - 1;
  const today = new Date();
  let totalWorkDays = 0;

  mLabel.textContent = current.toLocaleDateString("ru-RU", {
    month: "long",
    year: "numeric"
  });

  for (let i = 0; i < firstDay; i++) {
    c.innerHTML += '<div class="emptyCell"></div>';
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const dt = new Date(year, month, day);
    const isToday = dt.toDateString() === today.toDateString();
    let boxClass = "dayBox" + (isToday ? " today" : "");
    let dayStatus = "";

    names.forEach((name, idx) => {
      if (selected !== name) return;

      const startDate = parseWorkerStartDate(defaultDates[idx]);
      const baseShift = cycle(Math.floor((dt - startDate) / 864e5));
      const key = year + "-" + (month + 1) + "-" + day + "-" + name;
      const status = manual[key] || baseShift;

      if (status === "День" || status === "Ночь") {
        totalWorkDays++;
      }

      boxClass += " " + color(status);
      dayStatus = status;
    });

    c.innerHTML += '<div class="' + boxClass + '" onclick="toggle(\'' + year + "-" + (month + 1) + "-" + day + "-" + selected + '\', \'День\')">' +
      '<div class="dayNum">' + day + '</div>' +
      '<div class="dayName">' + dt.toLocaleDateString("ru-RU", { weekday: "short" }) + '</div>' +
      '<div class="dayShift">' + dayStatus + '</div>' +
      '</div>';
  }

  counter.textContent = "Рабочих смен (" + selected + "): " + totalWorkDays;
}

c.addEventListener("touchstart", event => {
  calendarStartX = event.touches[0].clientX;
  calendarStartY = event.touches[0].clientY;
}, { passive: true });

c.addEventListener("touchend", event => {
  const endX = event.changedTouches[0].clientX;
  const endY = event.changedTouches[0].clientY;
  const diffX = calendarStartX - endX;
  const diffY = calendarStartY - endY;

  if (Math.abs(diffY) > 50 || Math.abs(diffX) < 50) return;
  animateMonth(diffX > 0 ? 1 : -1);
}, { passive: true });

workerSwitch.addEventListener("touchstart", event => {
  workerStartX = event.touches[0].clientX;
  workerStartY = event.touches[0].clientY;
}, { passive: true });

workerSwitch.addEventListener("touchend", event => {
  const endX = event.changedTouches[0].clientX;
  const endY = event.changedTouches[0].clientY;
  const diffX = workerStartX - endX;
  const diffY = workerStartY - endY;

  if (Math.abs(diffY) > 40 || Math.abs(diffX) < 35) return;
  setWorker(diffX > 0 ? 1 : -1);
}, { passive: true });

prevBtn.addEventListener("click", () => animateMonth(-1));
nextBtn.addEventListener("click", () => animateMonth(1));
workerPrev.addEventListener("click", () => setWorker(-1));
workerNext.addEventListener("click", () => setWorker(1));

function init() {
  renderWeekHeader();
  workerName.textContent = selected;
  render();
}

init();
</script>
</body>
</html>
